<h1>🚨 Anti-Theft Protection System</h1>

<h2>Abstract</h2>

<p>
The Anti-Theft Protection System helps prevent theft of vehicles and valuable assets by detecting unauthorized movement and triggering an alarm.
</p>

<h2>Components Required</h2>

<ul>
<li>Vibration Sensor</li>
<li>Arduino Uno</li>
<li>Buzzer</li>
<li>LED</li>
<li>Breadboard</li>
<li>Jumper Wires</li>
<li>Battery</li>
</ul>

<h2>Working Principle</h2>

<p>
When vibration or movement is detected, the sensor sends a signal to Arduino, which activates the alarm system.
</p>

<h2>Applications</h2>

<ul>
<li>Homes</li>
<li>Offices</li>
<li>Apartments</li>
<li>Shops</li>
</ul>

<h2>Future Scope</h2>

<p>
Can be integrated with GSM or IoT modules to send alerts directly to mobile phones.
</p>
